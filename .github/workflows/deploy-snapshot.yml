name: Deploy Snapshot to Maven Central

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

jobs:
  deploy-snapshot:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            classes: "io.github.cacotopia.testcontainers.nacos.NacosVersionTest"
          - shard: 2
            classes: "io.github.cacotopia.testcontainers.nacos.NacosContainerBasicTest"
          - shard: 3
            classes: "io.github.cacotopia.testcontainers.nacos.NacosMySQLIntegrationTest"
          - shard: 4
            classes: "io.github.cacotopia.testcontainers.nacos.NacosNamingServiceTest,io.github.cacotopia.testcontainers.nacos.NacosConfigServiceTest"
          - shard: 4
            classes: "io.github.cacotopia.testcontainers.nacos.NacosClusterModeTest,io.github.cacotopia.testcontainers.nacos.NacosClusterTest"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Run tests (Shard ${{ matrix.shard }})
        run: |
          mvn test -Dtest="${{ matrix.classes }}" \
                   -Dsurefire.failIfNoSpecifiedTests=false
      - name: Deploy snapshot to Maven Central
        run: mvn -B clean deploy -DskipTests=true
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
